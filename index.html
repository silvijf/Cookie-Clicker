            <style>
                datalist {
                    display: flex;
                    flex-direction: column;
                    justify-content: space-between;
                    writing-mode: vertical-lr;
                    width: 200px;
                }
  
                option {
                    padding: 0;
                }
                
                input[type="range"] {
                    width: 200px;
                    margin: 0;
                }

                /* Dropdown Button */
                .dropbtn {
                    background-color: #04AA6D;
                    color: white;
                    padding: 16px;
                    font-size: 16px;
                    border: none;
                }
            
                /* The container <div> - needed to position the dropdown content */
                .dropdown {
                position: relative;
                display: inline-block;
                }
            
                /* Dropdown Content (Hidden by Default) */
                .dropdown-content {
                display: none;
                position: absolute;
                background-color: #f1f1f1;
                min-width: 160px;
                box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
                z-index: 1;
                }
            
                /* Links inside the dropdown */
                .dropdown-content a {
                color: black;
                padding: 12px 16px;
                text-decoration: none;
                display: block;
                }
            
                /* Change color of dropdown links on hover */
                .dropdown-content a:hover {background-color: #ddd;}
            
                /* Show the dropdown menu on hover */
                .dropdown:hover .dropdown-content {display: block;}
            
                /* Change the background color of the dropdown button when the dropdown content is shown */
                .dropdown:hover .dropbtn {background-color: #3e8e41;}
                .switch {
                    position: relative;
                    display: inline-block;
                    width: 60px;
                    height: 34px;
                }

                /* Hide default HTML checkbox */
                .switch input {
                opacity: 0;
                width: 0;
                height: 0;
                }

                /* The slider */
                .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #ccc;
                -webkit-transition: .4s;
                transition: .4s;
                }

                .slider:before {
                    position: absolute;
                    content: "";
                    height: 26px;
                    width: 26px;
                    left: 4px;
                    bottom: 4px;
                    background-color: white;
                    -webkit-transition: .4s;
                    transition: .4s;
                }

                input:checked + .slider {
                    background-color: #2196F3;
                }

                input:focus + .slider {
                    box-shadow: 0 0 1px #2196F3;
                }

                input:checked + .slider:before {
                    -webkit-transform: translateX(26px);
                    -ms-transform: translateX(26px);
                    transform: translateX(26px);
                }

                /* Rounded sliders */
                .slider.round {
                    border-radius: 34px;
                }

                .slider.round:before {
                    border-radius: 50%;
                }
            </style>

                console.log("Saved amount of factories: " + localStorage.getItem("amountFactory"));
                console.log("Saved amount of banks: " + localStorage.getItem("amountBank"));
                console.log("Saved amount of temples: " + localStorage.getItem("amountTemple"));
                console.log("Saved amount of wizard towers: " + localStorage.getItem("amountWTower"));

            }

            function normalbutton() {
                saveButton.className = "normal";
                loadButton.className = "normal";
            }

            function autoSave() {
                if (autosaveSwitch.checked) {
                    localStorage.setItem('cookies', clicks);
                    localStorage.setItem('cps', cps);

                    localStorage.setItem('amountCursor', cursor);
                    localStorage.setItem('amountGranny', granny);
                    localStorage.setItem('amountFarm', farm);
                    localStorage.setItem('amountMine', mine);
                    localStorage.setItem('amountFactory', factory);
                    localStorage.setItem('amountBank', bank);
                    localStorage.setItem('amountTemple', temple);
                    localStorage.setItem('amountWTower', wTower);
                    console.log("Progress succesfully autosaved.");
                    /*
                    console.log("Saved cookies: " + localStorage.getItem("cookies"));
                    console.log("Saved cps: " + localStorage.getItem("cps"));

                    console.warn("END OF AUTOSAVE INFORMATION")

                }
            }

            function toggleAutosave() {
                if (autosaveSwitch.checked) {
                    autosaveID = setInterval(autoSave, 3000);
                    console.log("Autosave has been started.")
                } else {
                    clearInterval(autosaveID);
                    console.log("Autosave has been stopped.")
                }
            }

            function load() {
                loadButton.className = "green"
                clicks = JSON.parse(localStorage.getItem('cookies'))
                cps = JSON.parse(localStorage.getItem('cps'))
                cookies.textContent = clicks
                cpsShow.textContent = cps + " cps"

                cursor = JSON.parse(localStorage.getItem('amountCursor'));
                granny = JSON.parse(localStorage.getItem('amountGranny'));
                farm = JSON.parse(localStorage.getItem('amountFarm'));
                mine = JSON.parse(localStorage.getItem('amountMine'));
                factory = JSON.parse(localStorage.getItem('amountFactory'));
                bank = JSON.parse(localStorage.getItem('amountBank'));
                temple = JSON.parse(localStorage.getItem('amountTemple'));
                wTower = JSON.parse(localStorage.getItem('amountWTower'));

                amountCursor.value = cursor
                amountGranny.value = granny
                amountFarm.value = farm
                amountMine.value = mine
                amountFactory.value = factory
                amountBank.value = bank
                amountTemple.value = temple
                amountWTower.value = wTower

                console.log("Progress loaded succesfully.");
                setTimeout(normalbutton, 2500)
            }

            function updateButtons() {
                // (1000 * Math.pow(1.15, cursor))
                if (clicks >= (3300000000 * Math.pow(1.15, wTower))) {
                    wTowerButton.className = "canBuy"
                } else {
                    wTowerButton.className = "cannotBuy"
                }
                if (clicks >= (200000000 * Math.pow(1.15, temple))) {
                    templeButton.className = "canBuy"

                    templeButton.className = "cannotBuy"

                if (clicks >= (1000 * Math.pow(1.15, granny))) {

                if (clicks >= (150 * Math.pow(1.15, cursor))) {

                }
            }

            setInterval(updateButtons, 100)

            function updateSellButtons() {
                if (cursor >= 1) {
                    sellCursorButton.className = "canSell"
                } else {

            function reset() {
                if (confirm("Are you sure you want to delete ALL your progress?")) {
                    if (confirm("Whoa! Wait, are you really sure? You can't undo this.")) {
                        if (confirm("Are you really really really really really sure? This is your final warning! You really can't undo this!")) {
                            localStorage.removeItem('cookies')
                            localStorage.removeItem('cps')
                            clicks = 0
                            cps = 0
                            cookies.textContent = 0
                            cpsShow.textContent = 0
                            alert("Don't say I didn't warn you!")
                            alert("Progress successfull removed.")
                        } else {
                        alert("That was close! You almost deleted your progress. Your progress has not been deleted.") 
                        }
                    } else {
                        alert("Wise choise! Your progress has not been deleted.")
                    }
                } else {
                    alert("Wise choise! Your progress has not been deleted.")
                }
            }
